<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLD Production System</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root {
  --bg:#F0F2F5;--surface:#ffffff;--surface2:#F7F8FA;
  --border:rgba(0,0,0,0.08);--border-md:rgba(0,0,0,0.15);
  --text:#1C1E24;--text2:#5A5F72;--text3:#9EA5B8;
  --purple:#4A43B0;--purple-bg:#ECEAFE;--purple-text:#3A33A0;
  --teal-bg:#E3F6EE;--teal-text:#0A6647;
  --amber-bg:#FEF3E2;--amber-text:#935200;
  --red:#D63F3F;--orange:#E8930F;
  --green:#16A34A;
  --blue-bg:#E8F2FD;--blue-text:#1358A5;
  --factory-bg:#2B3A5C;--factory-text:#C8D6F0;
  --shadow:0 1px 4px rgba(0,0,0,0.07),0 1px 2px rgba(0,0,0,0.05);
  --shadow-md:0 4px 16px rgba(0,0,0,0.10);
  --r-sm:4px;--r-md:8px;--r-lg:12px;
  /* factory colours */
  --c1:#F97316;--c2:#22C55E;--c3:#3B82F6;--c5:#EC4899;--c6:#6B7280;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ── TOPBAR ── */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;height:52px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:200;box-shadow:var(--shadow);}
.factory-badge{background:var(--factory-bg);color:var(--factory-text);font-size:11px;font-weight:600;padding:3px 9px;border-radius:var(--r-sm);letter-spacing:.5px;white-space:nowrap;}
.topbar-brand{font-size:14px;font-weight:700;color:var(--text);}
.topbar-spacer{flex:1;}
.clock{font-size:12px;color:var(--text2);font-variant-numeric:tabular-nums;white-space:nowrap;}
.import-btn{display:flex;align-items:center;gap:5px;padding:6px 12px;font-size:12px;font-weight:500;background:var(--purple);color:#fff;border:none;border-radius:var(--r-md);cursor:pointer;white-space:nowrap;}
.import-btn:hover{opacity:.9;}
.import-btn svg{width:13px;height:13px;}
.import-btn.secondary{background:var(--surface2);color:var(--text2);border:1px solid var(--border-md);}
.import-btn.secondary:hover{background:var(--border);}

/* ── TAB NAV ── */
.tab-nav{background:var(--surface);border-bottom:1px solid var(--border);display:flex;gap:0;padding:0 16px;position:sticky;top:52px;z-index:190;}
.tab-btn{padding:10px 16px;font-size:13px;font-weight:500;color:var(--text2);border:none;border-bottom:2px solid transparent;background:none;cursor:pointer;white-space:nowrap;transition:color .15s,border-color .15s;}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{color:var(--purple);border-bottom-color:var(--purple);font-weight:600;}
.tab-badge{display:inline-block;background:var(--red);color:#fff;font-size:9px;padding:1px 5px;border-radius:8px;margin-left:4px;vertical-align:middle;}

/* ── PAGE CONTAINERS ── */
.page{display:none;padding:16px 20px;max-width:1100px;margin:0 auto;}
.page.active{display:block;}
.page-full{display:none;padding:16px 20px;margin:0 auto;}
.page-full.active{display:block;}

/* ── SHARED COMPONENTS ── */
.section-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow);}
.field-lbl{font-size:10px;color:var(--text3);margin-bottom:3px;font-weight:500;letter-spacing:.3px;text-transform:uppercase;}

/* filter bar */
.filter-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:12px 14px;margin-bottom:10px;box-shadow:var(--shadow);}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;}
.search-wrap{flex:1;min-width:160px;}
.search-inner{position:relative;}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:14px;height:14px;opacity:.4;pointer-events:none;}
.search-input{width:100%;height:34px;padding:0 10px 0 30px;font-size:13px;border:1px solid var(--border-md);border-radius:var(--r-md);background:var(--surface2);color:var(--text);outline:none;transition:border-color .15s;}
.search-input:focus{border-color:var(--purple);}
.filter-group{position:relative;min-width:100px;flex:0 0 auto;}
.filter-input{height:34px;width:100%;padding:0 26px 0 10px;font-size:13px;border:1px solid var(--border-md);border-radius:var(--r-md);background:var(--surface2);color:var(--text);outline:none;cursor:text;transition:border-color .15s;}
.filter-input:focus{border-color:var(--purple);}
.filter-input::placeholder{color:var(--text3);}
.filter-arrow{position:absolute;right:7px;top:50%;transform:translateY(-50%);width:14px;height:14px;opacity:.4;pointer-events:none;}
.drop-panel{display:none;position:absolute;top:calc(100% + 4px);left:0;z-index:500;background:var(--surface);border:1px solid var(--border-md);border-radius:var(--r-md);min-width:180px;max-height:240px;overflow-y:auto;box-shadow:var(--shadow-md);}
.drop-panel.open{display:block;}
.drop-item{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;font-size:13px;color:var(--text);transition:background .1s;}
.drop-item:hover{background:var(--surface2);}
.drop-item input[type=checkbox]{width:14px;height:14px;accent-color:var(--purple);cursor:pointer;flex-shrink:0;}
.tags-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;min-height:0;}
.tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 8px;border-radius:20px;background:var(--purple-bg);color:var(--purple-text);border:1px solid rgba(83,74,183,.15);}
.tag .rm{cursor:pointer;font-size:14px;line-height:1;opacity:.6;}
.tag .rm:hover{opacity:1;}
.clear-btn{font-size:11px;color:var(--text2);cursor:pointer;text-decoration:underline;white-space:nowrap;background:none;border:none;padding:0;align-self:center;}

/* factory toggle btns */
.fac-toggles{display:flex;gap:4px;flex-wrap:wrap;}
.fac-btn{padding:4px 10px;font-size:11px;font-weight:600;border:1px solid var(--border-md);border-radius:20px;background:var(--surface);color:var(--text2);cursor:pointer;transition:all .15s;}
.fac-btn:hover{border-color:var(--purple);color:var(--purple);}
.fac-btn.active{color:#fff;border-color:transparent;}
.fac-btn[data-f="ALL"].active{background:var(--factory-bg);}
.fac-btn[data-f="GLD1"].active{background:var(--c1);}
.fac-btn[data-f="GLD2"].active{background:var(--c2);}
.fac-btn[data-f="GLD3"].active{background:var(--c3);}
.fac-btn[data-f="GLD5"].active{background:var(--c5);}
.fac-btn[data-f="GLD6"].active{background:var(--c6);}

/* factory dot */
.fac-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0;}
.fd-GLD1{background:var(--c1);}
.fd-GLD2{background:var(--c2);}
.fd-GLD3{background:var(--c3);}
.fd-GLD5{background:var(--c5);}
.fd-GLD6{background:var(--c6);}

/* sort toolbar */
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.sort-lbl{font-size:11px;color:var(--text2);white-space:nowrap;}
.sort-btn{font-size:11px;padding:4px 10px;border:1px solid var(--border-md);border-radius:20px;background:var(--surface);color:var(--text2);cursor:pointer;transition:all .15s;}
.sort-btn:hover{border-color:var(--purple);color:var(--purple);}
.sort-btn.active{background:var(--purple);color:#fff;border-color:var(--purple);}
.toolbar-spacer{flex:1;}
.result-count{font-size:12px;color:var(--text2);}

/* stats bar */
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:10px 12px;box-shadow:var(--shadow);}
.stat-lbl{font-size:10px;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px;}
.stat-val{font-size:20px;font-weight:700;color:var(--text);}

/* badge */
.badge{font-size:10px;padding:2px 7px;border-radius:3px;font-weight:600;white-space:nowrap;}
.b-factory{background:var(--factory-bg);color:var(--factory-text);}
.b-buyer{background:var(--blue-bg);color:var(--blue-text);}
.b-knit{background:var(--teal-bg);color:var(--teal-text);}
.b-woven{background:var(--amber-bg);color:var(--amber-text);}
.b-ship{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
.b-special{background:#fbeaf0;color:#993556;}

/* ── WORKSHEET styles (existing) ── */
.cards-list{display:flex;flex-direction:column;gap:8px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow);transition:border-color .15s,box-shadow .15s;}
.card:hover{border-color:var(--border-md);box-shadow:0 2px 8px rgba(0,0,0,.1);}
.card.urgent{border-left:3px solid var(--red);}
.card.warn{border-left:3px solid var(--orange);}
.card-row{display:flex;gap:12px;padding:12px 14px;align-items:flex-start;cursor:pointer;}
.card-img{width:72px;height:72px;min-width:72px;background:var(--surface2);border-radius:var(--r-md);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden;color:var(--text3);flex-shrink:0;}
.card-img img{width:100%;height:100%;object-fit:cover;}
.card-img svg{width:28px;height:28px;opacity:.4;}
.card-img.has-img{cursor:zoom-in;}
.card-body{flex:1;min-width:0;}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;}
.card-title{font-size:14px;font-weight:700;color:var(--text);}
.card-sub{font-size:11px;color:var(--text2);margin-top:1px;}
.card-chevron{color:var(--text3);padding-top:2px;flex-shrink:0;transition:transform .2s;}
.card-chevron.open{transform:rotate(180deg);}
.badge-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px;}
.card-nums{display:grid;grid-template-columns:repeat(3,1fr);gap:4px 10px;margin-top:8px;}
.num-lbl{font-size:10px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.3px;}
.num-val{font-size:13px;font-weight:600;color:var(--text);margin-top:1px;}
.num-val.purple{color:var(--purple);}
.num-val.urgent-c{color:var(--red);}
.num-val.warn-c{color:var(--orange);}
.fabric-line{margin-top:5px;font-size:10px;color:var(--text3);display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;}
.ppic-row{margin-top:5px;display:flex;gap:5px;flex-wrap:wrap;}
.ppic-badge{font-size:10px;padding:2px 7px;border-radius:3px;background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
.po-block{display:none;border-top:1px solid var(--border);}
.po-block.open{display:block;}
.po-table{width:100%;font-size:11px;border-collapse:collapse;table-layout:fixed;}
.po-table th{background:var(--surface2);padding:6px 8px;text-align:left;color:var(--text2);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.3px;border-bottom:1px solid var(--border);white-space:nowrap;overflow:hidden;}
.po-table td{padding:5px 8px;border-bottom:1px solid var(--border);color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.po-table tr:last-child td{background:var(--surface2);font-weight:700;border-bottom:none;}
.po-urgent{color:var(--red);font-weight:600;}
.po-warn{color:var(--orange);font-weight:600;}

/* ── UPLOAD ── */
#ws-upload-overlay,#pp-upload-overlay,#eff-upload-overlay{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:16px;padding:32px;}
.upload-card{background:var(--surface);border:2px dashed var(--border-md);border-radius:var(--r-lg);padding:40px 36px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;max-width:480px;width:100%;}
.upload-card:hover,.upload-card.drag{border-color:var(--purple);background:var(--purple-bg);}
.upload-icon{font-size:36px;margin-bottom:10px;}
.upload-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:5px;}
.upload-hint{font-size:12px;color:var(--text2);}
.upload-hint span{color:var(--purple);font-weight:500;}
.progress-msg{font-size:13px;color:var(--text2);text-align:center;min-height:18px;}

/* ── SCHEDULE VIEW ── */
.sv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px;}
.sv-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow);cursor:pointer;transition:border-color .15s;}
.sv-card:hover{border-color:var(--border-md);}
.sv-card.is-change-7{border-left:3px solid var(--red);animation:pulse-red 2s infinite;}
.sv-card.is-change-14{border-left:3px solid var(--orange);}
@keyframes pulse-red{0%,100%{box-shadow:var(--shadow)}50%{box-shadow:0 0 0 3px rgba(214,63,63,.15)}}
.sv-card-head{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid var(--border);}
.sv-line-no{font-size:15px;font-weight:700;color:var(--text);}
.sv-line-fac{font-size:10px;font-weight:600;padding:2px 6px;border-radius:3px;}
.sv-card-body{padding:10px 12px;}
.sv-style{font-size:13px;font-weight:600;color:var(--text);}
.sv-buyer{font-size:11px;color:var(--text2);margin-top:1px;}
.sv-dates{display:flex;gap:12px;margin-top:6px;font-size:11px;color:var(--text2);}
.sv-dates span b{color:var(--text);font-weight:600;}
.sv-change-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;margin-left:auto;}
.change-badge-7{background:#FEEAEA;color:var(--red);}
.change-badge-14{background:#FEF3E2;color:var(--orange);}
.sv-expand{border-top:1px solid var(--border);padding:8px 12px;display:none;flex-direction:column;gap:6px;}
.sv-expand.open{display:flex;}
.sv-seg{display:flex;align-items:center;gap:8px;font-size:11px;padding:4px 6px;border-radius:var(--r-sm);background:var(--surface2);}
.sv-seg-num{font-size:10px;color:var(--text3);min-width:16px;}
.sv-seg-style{font-weight:600;color:var(--text);flex:1;}
.sv-seg-date{color:var(--text2);}
.sv-modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:400;align-items:center;justify-content:center;padding:20px;}
.sv-modal-backdrop.open{display:flex;}
.sv-modal{background:var(--surface);border-radius:var(--r-lg);max-width:560px;width:100%;max-height:80vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.18);}
.sv-modal-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.sv-modal-title{font-size:15px;font-weight:700;color:var(--text);}
.sv-modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text2);line-height:1;}
.sv-modal-body{overflow-y:auto;padding:14px 18px;flex:1;}
.sv-modal-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;}
.sv-modal-row:last-child{border-bottom:none;}

/* ── CALENDAR ── */
.cal-nav{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.cal-month{font-size:16px;font-weight:700;color:var(--text);min-width:120px;text-align:center;}
.cal-nav-btn{width:30px;height:30px;border:1px solid var(--border-md);border-radius:var(--r-md);background:var(--surface);cursor:pointer;font-size:16px;color:var(--text2);display:flex;align-items:center;justify-content:center;}
.cal-nav-btn:hover{background:var(--surface2);}
.cal-today-btn{padding:4px 12px;font-size:12px;border:1px solid var(--border-md);border-radius:var(--r-md);background:var(--surface);cursor:pointer;color:var(--text2);}
.cal-today-btn:hover{background:var(--surface2);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-dow{text-align:center;font-size:10px;font-weight:600;color:var(--text3);padding:4px 0;text-transform:uppercase;}
.cal-cell{min-height:72px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:4px;cursor:pointer;transition:background .15s;display:flex;flex-direction:column;gap:2px;}
.cal-cell:hover{background:var(--surface2);}
.cal-cell.other-month{background:var(--bg);opacity:.5;}
.cal-cell.weekend{background:#FAFAFA;}
.cal-cell.today .cal-day-num{background:var(--purple);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;}
.cal-cell.has-event{border-color:rgba(74,67,176,.2);}
.cal-day-num{font-size:12px;font-weight:600;color:var(--text);padding:1px 2px;}
.cal-dots{display:flex;gap:2px;flex-wrap:wrap;margin-top:2px;}
.cal-dot{width:7px;height:7px;border-radius:50%;}
.cal-more{font-size:9px;color:var(--text3);}
.cal-event-tag{font-size:9px;padding:1px 4px;border-radius:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}

/* ── LINE SCHEDULE ── */
.ls-table-wrap{overflow-x:auto;}
.ls-table{border-collapse:collapse;width:100%;font-size:12px;}
.ls-table th,
.ls-table td{border:1px solid var(--border);padding:6px 8px;text-align:left;white-space:nowrap;}
.ls-table th{background:var(--surface2);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.3px;color:var(--text2);position:sticky;top:0;}
.ls-line-cell{background:var(--surface2);font-weight:700;min-width:80px;}
.ls-seg-cell{min-width:160px;cursor:pointer;transition:filter .1s;}
.ls-seg-cell:hover{filter:saturate(2.5) brightness(.9);outline:2px solid var(--purple);}
.ls-seg-inner{padding:2px 4px;border-radius:3px;}
.ls-seg-style{font-weight:600;font-size:11px;}
.ls-seg-date{font-size:10px;opacity:.75;margin-top:1px;}
.ls-date-urgent{background:#FEEAEA;border-radius:3px;padding:0 3px;color:var(--red);}
.ls-divider-green{border-left:2px dashed var(--teal-text);}
.ls-divider-orange{border-left:2px dashed var(--orange);}

/* ── EFFICIENCY ── */
.eff-ctrl{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
.eff-ctrl label{font-size:11px;color:var(--text2);}
.eff-ctrl select,.eff-ctrl input[type=number]{height:30px;padding:0 8px;font-size:12px;border:1px solid var(--border-md);border-radius:var(--r-md);background:var(--surface);color:var(--text);outline:none;}
.eff-table-wrap{overflow-x:auto;}
.eff-table{border-collapse:collapse;width:100%;font-size:11px;}
.eff-table th,.eff-table td{border:1px solid var(--border);padding:5px 7px;text-align:center;white-space:nowrap;}
.eff-table th{background:var(--surface2);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.3px;color:var(--text2);}
.eff-table td.left{text-align:left;}
.eff-table tr.main-row{font-weight:600;}
.eff-table tr.sub-row td{font-size:10px;background:#FAFBFF;padding:4px 7px;}
.eff-table tr.sub-row td:first-child{padding-left:20px;text-align:left;}
.eff-green td.eff-val{background:var(--teal-bg);color:var(--teal-text);font-weight:700;}
.eff-orange td.eff-val{background:var(--amber-bg);color:var(--amber-text);font-weight:700;}
.eff-red td.eff-val{background:#FEEAEA;color:var(--red);font-weight:700;}
.eff-zero{color:var(--text3);}
.eff-mp-input{width:48px;text-align:center;border:1px solid var(--border-md);border-radius:3px;padding:2px 4px;font-size:11px;background:var(--surface);}
.eff-main-bar{border-left:3px solid var(--purple);}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:48px 16px;color:var(--text2);}
.empty svg{width:36px;height:36px;opacity:.3;margin:0 auto 10px;display:block;}

/* ── LIGHTBOX ── */
#lightbox{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.85);backdrop-filter:blur(6px);align-items:center;justify-content:center;padding:20px;}
#lightbox.open{display:flex;}
#lightbox-inner{position:relative;display:flex;flex-direction:column;align-items:center;gap:12px;}
#lightbox img{max-width:90vw;max-height:80vh;border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.6);object-fit:contain;}
#lightbox-meta{color:#fff;font-size:13px;opacity:.8;}
#lightbox-close{position:absolute;top:-14px;right:-14px;width:32px;height:32px;background:rgba(255,255,255,.15);border:none;border-radius:50%;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
#lightbox-close:hover{background:rgba(255,255,255,.3);}

/* ── MODAL ── */

<script>
// ══════════════════════════════════════════
// UTILITIES
// ══════════════════════════════════════════
const TODAY = new Date(); TODAY.setHours(0,0,0,0);

function daysDiff(d){ if(!d) return 9999; const t=new Date(d); t.setHours(0,0,0,0); return Math.round((t-TODAY)/86400000); }
function fmtDate(d){ if(!d) return '—'; const dt=new Date(d); if(isNaN(dt.getTime())) return '—'; return `${dt.getMonth()+1}/${dt.getDate()}`; }
function fmtDateFull(d){ if(!d) return '—'; const dt=new Date(d); return `${dt.getFullYear()}/${dt.getMonth()+1}/${dt.getDate()}`; }
function fmtN(n){ return n>=1000?n.toLocaleString('zh-TW'):String(n); }
function facClass(f){ const m={'GLD1':'fd-GLD1','GLD2':'fd-GLD2','GLD3':'fd-GLD3','GLD5':'fd-GLD5','GLD6':'fd-GLD6'}; return m[f]||''; }
function facColor(f){ const m={'GLD1':'var(--c1)','GLD2':'var(--c2)','GLD3':'var(--c3)','GLD5':'var(--c5)','GLD6':'var(--c6)'}; return m[f]||'var(--text3)'; }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
function hsvToRgb(h,s,v){ let r,g,b; const i=Math.floor(h*6),f=h*6-i,p=v*(1-s),q=v*(1-f*s),t=v*(1-(1-f)*s); switch(i%6){case 0:r=v;g=t;b=p;break;case 1:r=q;g=v;b=p;break;case 2:r=p;g=v;b=t;break;case 3:r=p;g=q;b=v;break;case 4:r=t;g=p;b=v;break;case 5:r=v;g=p;b=q;break;} return `rgba(${Math.round(r*255)},${Math.round(g*255)},${Math.round(b*255)},0.18)`; }
function styleColor(style){ let h=0; for(const c of style) h=(h*31+c.charCodeAt(0))%360; return hsvToRgb(h/360, 0.55, 0.95); }

// Clock
function updateClock(){ const n=new Date(); document.getElementById('clock').textContent=n.toTimeString().slice(0,8); }
setInterval(updateClock,1000); updateClock();

// ── TAB SWITCH ──
const TAB_PAGES = {ws:'page-ws', sv:'page-sv', cal:'page-cal', ls:'page-ls', eff:'page-eff'};
const TAB_IMPORTS = {ws:'ws-import-btn', sv:'pp-import-btn', cal:'pp-import-btn', ls:'pp-import-btn', eff:'eff-import-btn'};
let currentTab = 'ws';

function switchTab(tab, btn){
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  // show/hide pages
  Object.keys(TAB_PAGES).forEach(t=>{
    const el=document.getElementById(TAB_PAGES[t]);
    if(el) el.className = el.className.replace(' active','') + (t===tab?' active':'');
  });
  // show correct import button
  document.getElementById('ws-import-btn').style.display = tab==='ws'?'':'none';
  document.getElementById('pp-import-btn').style.display = (tab==='sv'||tab==='cal'||tab==='ls')?'':'none';
  document.getElementById('eff-import-btn').style.display = tab==='eff'?'':'none';

async function xlsxLoadZip(file){ const buf=await file.arrayBuffer(); return JSZip.loadAsync(buf); }

async function xlsxGetSS(zip){
  const ssFile=zip.file('xl/sharedStrings.xml'); if(!ssFile) return [];
  const xml=await ssFile.async('text');
  const sis=[], re=/<si>([\s\S]*?)<\/si>/g; let m;
  while((m=re.exec(xml))!==null){
    const segs=[]; const tr=/<t(?:\s[^>]*)?>([^<]*)<\/t>/g; let tm;
    while((tm=tr.exec(m[1]))!==null) segs.push(tm[1]);
    sis.push(segs.join('').replace(/&#(\d+);/g,(_,c)=>String.fromCharCode(+c)).replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>'));
  }
  return sis;
}

function xlsxParseRow(rxml, ssArr){
  const cells={};
  const re=/<c ([^>]+?)(?:\/>|>([\s\S]*?)<\/c>)/g; let cr;
  while((cr=re.exec(rxml))!==null){
    const as=cr[1], inner=cr[2]||'';
    const colM=as.match(/r="([A-Z]+)\d+"/); if(!colM) continue;
    const col=colM[1];
    if(!inner){cells[col]='';continue;}
    const vM=inner.match(/<v>([^<]*)<\/v>/); if(!vM){cells[col]='';continue;}
    let val=vM[1];
    if(as.includes('t="s"')) val=ssArr[parseInt(val)]||'';
    else if(as.includes('t="str"')){const tM=inner.match(/<t>([^<]*)<\/t>/);if(tM) val=tM[1];}
    cells[col]=val;
  }
  return cells;
}

async function xlsxGetSheets(zip){
  const wbXml=await zip.file('xl/workbook.xml').async('text');
  const wbRels=await zip.file('xl/_rels/workbook.xml.rels').async('text');
  const relMap={}; let rm; const rr=/Id="([^"]+)"[^>]*Target="([^"]+)"/g;
  while((rm=rr.exec(wbRels))!==null) relMap[rm[1]]=rm[2];
  const sheets=[]; let sm; const sr=/<sheet\s[^>]*name="([^"]+)"[^>]*r:id="([^"]+)"/g;
  while((sm=sr.exec(wbXml))!==null) sheets.push({name:sm[1],rId:sm[2]});
  return {sheets, relMap};
}

function xlsxDateToMs(v){
  if(v===null||v===undefined||v==='') return null;
  if(v instanceof Date) return isNaN(v)?null:v.getTime();
  if(typeof v==='string'){
    const s=v.trim(); if(!s) return null;
    // YYYY/MM/DD 或 YYYY-MM-DD
    const m1=s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})$/);
    if(m1) return new Date(+m1[1],+m1[2]-1,+m1[3],12,0,0,0).getTime();
    // M/D 或 MM/DD（推斷為當年）
    const m2=s.match(/^(\d{1,2})\/(\d{1,2})$/);
    if(m2) return new Date(new Date().getFullYear(),+m2[1]-1,+m2[2],12,0,0,0).getTime();
    // 數字字串：>59 才視為 Excel 序號（排除天數、人數等小數字）
    const n2=parseFloat(s);
    if(!isNaN(n2)&&n2>59) return new Date(Math.round((n2-25569)*86400000)+43200000).getTime();
    return null;
  }
  // 數值型 Excel 序號：>59 才解析（排除 1~59 的垃圾值）
  const n=parseFloat(v);
  if(isNaN(n)||n<=59) return null;
  return new Date(Math.round((n-25569)*86400000)+43200000).getTime();
}
function xlsxDateToStr(v){ const ms=xlsxDateToMs(v); return ms?fmtDate(new Date(ms)):''; }

// IMAGE EXTRACTION (worksheet)
// ══════════════════════════════════════════
async function extractImages(zip, sheetNum){
  const imgMap={};
  try{
    const relsFile=zip.file(`xl/worksheets/_rels/sheet${sheetNum}.xml.rels`); if(!relsFile) return imgMap;
    const relsXml=await relsFile.async('text');
    const dm=relsXml.match(/Id="([^"]+)"[^>]*Target="\.\.\/drawings\/drawing(\d+)\.xml"/); if(!dm) return imgMap;
    const drawNum=dm[2];
    const drawFile=zip.file(`xl/drawings/drawing${drawNum}.xml`); if(!drawFile) return imgMap;
    const drawXml=await drawFile.async('text');
    const mediaMap={};
    const drRF=zip.file(`xl/drawings/_rels/drawing${drawNum}.xml.rels`);
    if(drRF){ const drX=await drRF.async('text'); let r; const rr=/Id="([^"]+)"[^>]*Target="([^"]+)"/g; while((r=rr.exec(drX))!==null) mediaMap[r[1]]=r[2].replace('../','xl/'); }
    const ar=/<xdr:(?:twoCellAnchor|oneCellAnchor)[^>]*>([\s\S]*?)<\/xdr:(?:twoCellAnchor|oneCellAnchor)>/g; let am;
    while((am=ar.exec(drawXml))!==null){
      const blk=am[1]; const rM=blk.match(/<xdr:row>\s*(\d+)\s*<\/xdr:row>/); const idM=blk.match(/r:embed="([^"]+)"/);
      if(!rM||!idM) continue;
      const row0=parseInt(rM[1]); const mp=mediaMap[idM[1]];
      if(mp){ const imgF=zip.file(mp); if(imgF){ const ext=mp.split('.').pop().toLowerCase(); const mime=ext==='png'?'image/png':'image/jpeg'; const b64=await imgF.async('base64'); const url=`data:${mime};base64,${b64}`; for(let d=-2;d<=2;d++) if(!imgMap[row0+d]) imgMap[row0+d]=url; } }
    }
  }catch(e){}
  return imgMap;
}

}

async function wsParseFile(file, zip, ssArr){
  const factoryM=file.name.match(/GLD(\d)/i);
  const defFactory=factoryM?`GLD${factoryM[1]}`:'GLD?';
  const {sheets,relMap}=await xlsxGetSheets(zip);
  const stylesMap={}, specials={};
  let lastFs=null;
  for(let si=0;si<sheets.length;si++){
    const sh=sheets[si];
    const buyer=sh.name.replace(/\s*\d+$/,'').trim();
    const target=relMap[sh.rId]; if(!target) continue;
    const shPath=target.startsWith('xl/')?target:'xl/'+target;
    const shFile=zip.file(shPath); if(!shFile) continue;
    const sheetNum=(target.match(/sheet(\d+)/)||['','1'])[1];
    const imgMap=await extractImages(zip,sheetNum);
    const shXml=await shFile.async('text');
    const rowMap={};
    const rr=/<row\s[^>]*r="(\d+)"[^>]*>([\s\S]*?)<\/row>/g; let r;
    while((r=rr.exec(shXml))!==null) rowMap[parseInt(r[1])]=xlsxParseRow(r[2],ssArr);
    const maxRow=Math.max(...Object.keys(rowMap).map(Number),0);
    for(let rn=4;rn<=maxRow;rn++){
      const row=rowMap[rn]; if(!row) continue;
      const cellE=(row['E']||'').trim(), cellB=(row['B']||'').trim();
      if(cellE.startsWith('[特車]')||cellB.startsWith('[特車]')){
        const txt=(cellE.startsWith('[特車]')?cellE:cellB).replace('[特車]','').trim().replace(/;$/,'');
        if(lastFs&&txt){if(!specials[lastFs])specials[lastFs]=[];if(!specials[lastFs].includes(txt))specials[lastFs].push(txt);}
        continue;
      }
      if(!cellE) continue;
      const fstyle=cellE; lastFs=fstyle;
      const seqNum=/^\d+$/.test(cellB)?cellB:'';
      const qty=Math.round(parseFloat(row['I'])||0), ie=parseFloat(row['J'])||0;
      const po=(row['H']||'').trim(), exp=xlsxDateToStr(row['N']), crfp2=xlsxDateToStr(row['L']), odx=xlsxDateToStr(row['M']);
      const fabric=(row['R']||'').trim(), ppic_fu=(row['S']||'').trim(), ppic_fab=(row['T']||'').trim();
      const cstyle=(row['F']||'').trim(), index_val=(row['G']||'').trim(), ship_mode=(row['Q']||'').trim();
      const factory=(row['O']||'').trim()||defFactory, shipper=(row['P']||'').trim();
      const bl=cellB.toLowerCase().trim();
      let this_fab='',this_prod='';
      if(cellB&&!WS_SKIP.has(bl)){
        if(bl==='knit'||bl==='woven') this_fab=cellB.charAt(0).toUpperCase()+cellB.slice(1).toLowerCase();
        else if(cellB.length>1&&!/^\d+$/.test(cellB)&&!/^MR\./i.test(cellB)&&!['Sandy','Serena','Francis','Ellen','Phoebe','Katie','Novi','Reni','Fafa','DIKA','AFAF','WATI','ANIS','NOVI','RENI','NINGSIH'].some(n=>cellB.includes(n))) this_prod=cellB;
      }
      if(!stylesMap[fstyle]){
        let img=null; for(let d=-3;d<=3&&!img;d++) img=imgMap[rn-1+d]||null;
        let fab_type=this_fab;
        if(!fab_type&&fabric) fab_type=fabric.toLowerCase().includes('knit')?'Knit':fabric.toLowerCase().includes('woven')?'Woven':'';
        stylesMap[fstyle]={fstyle,cstyle,buyer,index:index_val,ie,factory,ship_mode,fabric,ppic_fu,ppic_fab,seq:seqNum,total_qty:0,pos:[],export_dates:[],crfp2_dates:[],fab_type,prod_desc:this_prod,specials:[],img};
      } else {
        const s=stylesMap[fstyle];
        if(!s.fab_type&&this_fab) s.fab_type=this_fab;
        if(!s.prod_desc&&this_prod) s.prod_desc=this_prod;
        if(!s.img){for(let d=-3;d<=3&&!s.img;d++) s.img=imgMap[rn-1+d]||null;}
      }
      const s=stylesMap[fstyle]; s.total_qty+=qty;
      if(po&&po!=='0') s.pos.push({po,qty,ie,std_qty:parseFloat((qty*ie/1000).toFixed(2)),crfp2,export:exp,odx,factory,shipper,ship_mode});
      if(exp&&!s.export_dates.includes(exp)) s.export_dates.push(exp);
      if(crfp2&&!s.crfp2_dates.includes(crfp2)) s.crfp2_dates.push(crfp2);
    }
  }
  Object.keys(specials).forEach(fs=>{if(stylesMap[fs]) stylesMap[fs].specials=specials[fs];});
  return Object.values(stylesMap).filter(s=>s.total_qty>0).map(s=>{
    s.export_date=!s.export_dates.length?'':s.export_dates.length===1?s.export_dates[0]:`${s.export_dates[0]}~${s.export_dates[s.export_dates.length-1]}`;
    s.export_date_first=s.export_dates[0]||'';
    s.crfp2_disp=!s.crfp2_dates.length?'':s.crfp2_dates.length===1?s.crfp2_dates[0]:`${s.crfp2_dates[0]}~${s.crfp2_dates[s.crfp2_dates.length-1]}`;
    if(!s.fab_type&&s.fabric) s.fab_type=s.fabric.toLowerCase().includes('knit')?'Knit':s.fabric.toLowerCase().includes('woven')?'Woven':'';
    return s;
  });
}

// PRODUCTION PLANNING PARSER (shared by SV/Cal/LS)
// ══════════════════════════════════════════
let PP_DATA = []; // raw rows from planning excel

async function ppParseFile(file){
  document.getElementById('sv-progress').textContent=`⏳ 解析 ${file.name}…`;
  const factoryM=file.name.match(/GLD(\d)/i);
  const defFactory=factoryM?`GLD${factoryM[1]}`:'GLD?';
  const zip=await xlsxLoadZip(file);
  const ssArr=await xlsxGetSS(zip);
  const {sheets,relMap}=await xlsxGetSheets(zip);
  let rows=[];
  for(const sh of sheets){
    if(!sh.name.toLowerCase().includes('production')) continue;
    const target=relMap[sh.rId]; if(!target) continue;
    const shPath=target.startsWith('xl/')?target:'xl/'+target;
    const shFile=zip.file(shPath); if(!shFile) continue;
    const shXml=await shFile.async('text');
    const allRows=[]; const rr=/<row\s[^>]*r="(\d+)"[^>]*>([\s\S]*?)<\/row>/g; let r;
    while((r=rr.exec(shXml))!==null) allRows.push({rn:parseInt(r[1]),cells:xlsxParseRow(r[2],ssArr)});
    // Find header row: col A = "Line"
    let headerRow=-1, colMap={};
    for(const {rn,cells} of allRows.slice(0,15)){
      if((cells['A']||'').toLowerCase().trim()==='line'){
        headerRow=rn;
        const hc=cells;
        // Map column letters to field names
        // 將欄位依欄號從左到右排序（A < B < ... < Z < AA < AB...），確保第一個 match 優先
        const colToIdx=col=>{
          let n=0;
          for(const ch of col) n=n*26+(ch.charCodeAt(0)-64);
          return n;
        };
        const sortedEntries=Object.entries(hc).sort((a,b)=>colToIdx(a[0])-colToIdx(b[0]));
        for(const [col,val] of sortedEntries){
          // 正規化：去除換行、多餘空白，轉小寫
          const v=(val||'').toLowerCase().replace(/[\r\n\t]+/g,' ').replace(/\s+/g,' ').trim();
          if(v==='line'&&!colMap.Line) colMap.Line=col;
          else if(v==='buyer'&&!colMap.Buyer) colMap.Buyer=col;
          else if((v==='style'||v.startsWith('style '))&&!colMap.Style) colMap.Style=col;
          else if(v.includes('product item')&&!colMap.ProductItem) colMap.ProductItem=col;
          else if((v.includes('allocate')||v==='alloc qty'||v==='qty')&&!colMap.AllocQTY) colMap.AllocQTY=col;
          else if((v.includes('sewing start')||v==='start')&&!colMap.SewingStart) colMap.SewingStart=col;
          else if((v.includes('sewing finish')||v==='finish')&&!colMap.SewingFinish) colMap.SewingFinish=col;
          else if(v==='ie'&&!colMap.IE) colMap.IE=col;
          else if((v.includes('worker')||v==='mp'||v==='workers per line')&&!colMap.Workers) colMap.Workers=col;
          else if((v.includes('daily target'))&&!colMap.DailyTarget) colMap.DailyTarget=col;
          else if((v==='eff'||v==='efficiency')&&!colMap.EFF) colMap.EFF=col;
          else if((v==='crfp'||v.includes('crfp'))&&!colMap.CRFP) colMap.CRFP=col;
          else if(v.includes('cutting')&&!colMap.CuttingDate) colMap.CuttingDate=col;
        }
        break;
      }
    }
    if(headerRow<0){ console.warn('No header row found in sheet:', sh.name); continue; }
    // SewingFinish 欄位已透過排序優先選最靠左的 match，不需要額外驗證
    console.log('Sheet:', sh.name, 'HeaderRow:', headerRow, 'ColMap:', JSON.stringify(colMap));
    // dataStart: skip header + 1 optional sub-header row; but also accept headerRow+1
    const dataStart=headerRow+1;
    for(const {rn,cells} of allRows){
      if(rn<dataStart) continue;
      const lineVal=(cells[colMap.Line||'A']||'').trim();
      // Valid line: starts with digit (e.g. 1-01, 6-12) — skip sub-header rows
      if(!/^\d/.test(lineVal)) continue;
      const lineNum=parseInt(lineVal.split('-')[0]);
      const factory=lineNum===1?'GLD1':lineNum===2?'GLD2':lineNum===3?'GLD3':lineNum===5?'GLD5':lineNum===6?'GLD6':defFactory;
      const rawStart=cells[colMap.SewingStart], rawFinish=cells[colMap.SewingFinish];
      const parsedStart=xlsxDateToMs(rawStart);
      // SewingFinish: 若解析結果為 null（值太小，非日期序號）
      // 嘗試用 SewingStart + rawFinish 天數推算（有些 Excel 存的是生產天數）
      // SewingFinish: 直接解析，日期格式同 SewingStart（文字或 Excel 序號）
      let parsedFinish=xlsxDateToMs(rawFinish);
      if(rows.length<3) console.log(`Row ${rn}: Line=${lineVal} rawStart=${rawStart} rawFinish=${rawFinish} parsedStart=${parsedStart} parsedFinish=${parsedFinish} colSewingFinish=${colMap.SewingFinish}`);
      rows.push({
        Line:lineVal, Factory:factory,
        Buyer:(cells[colMap.Buyer||'B']||'').trim(),
        Style:(cells[colMap.Style||'C']||'').trim(),
        ProductItem:(cells[colMap.ProductItem||'D']||'').trim(),
        AllocQTY:Math.round(parseFloat(cells[colMap.AllocQTY||'E'])||0),
        SewingStart:parsedStart,
        SewingFinish:parsedFinish,
        IE:parseFloat(cells[colMap.IE])||0,
        Workers:Math.round(parseFloat(cells[colMap.Workers])||0),
        DailyTarget:Math.round(parseFloat(cells[colMap.DailyTarget])||0),
        EFF:parseFloat(cells[colMap.EFF])||0,
      });
    }
  }
  return rows;
}

// ── groupLineSegments ──
// 邏輯：
//   1. 先依 Line 分組，每個 Line 的 rows 依 SewingStart 升序排列
//   2. 相鄰且相同 Style 的 rows 合併為同一個 Segment
//      → SewingStart 取最小值，SewingFinish 取最大值
//   3. 同款式若不相鄰（中間有其他款），視為兩個不同 Segment
//   4. Active Segment：SewingFinish >= 今天 的第一個
//      若全部已結束則取最後一個（顯示歷史最新款）
function groupLineSegments(rows){
  // Step 1: 先依 Line 分組並排序
  const lineRows={};
  for(const r of rows){
    if(!lineRows[r.Line]) lineRows[r.Line]={factory:r.Factory,rows:[]};
    lineRows[r.Line].rows.push(r);
  }
  const byLine={};
  for(const [line,{factory,rows:lrows}] of Object.entries(lineRows)){
    // 依 SewingStart 升序排列
    lrows.sort((a,b)=>(a.SewingStart||0)-(b.SewingStart||0));
    byLine[line]={line,factory,segs:[]};
    const segs=byLine[line].segs;
    for(const r of lrows){
      const last=segs[segs.length-1];
      // 相鄰且相同款式 → 合併
      if(last && last.style===r.Style){
        last.rows.push(r);
        if(r.SewingStart&&(!last.sewingStart||r.SewingStart<last.sewingStart)) last.sewingStart=r.SewingStart;
        if(r.SewingFinish&&(!last.sewingFinish||r.SewingFinish>last.sewingFinish)) last.sewingFinish=r.SewingFinish;
        last.allocQTY+=r.AllocQTY;
      } else {
        // 新 Segment
        segs.push({
          style:r.Style, buyer:r.Buyer, ie:r.IE,
          workers:r.Workers, allocQTY:r.AllocQTY,
          sewingStart:r.SewingStart, sewingFinish:r.SewingFinish,
          rows:[r]
        });
      }
    }
  }
  return byLine;
}

// ── getActiveIdx：找 Active Segment 的索引 ──
// Active = SewingFinish >= 今天的第一個 Segment
// 若全部結束 → 最後一個（顯示最新歷史款）
function getActiveIdx(segs){
  const todayMs=TODAY.getTime();
  const idx=segs.findIndex(s=>s.sewingFinish&&s.sewingFinish>=todayMs);
  return idx>=0 ? idx : segs.length-1;
}

let calYear=TODAY.getFullYear(), calMonth=TODAY.getMonth(), calFac='ALL';
const DOW=['日','一','二','三','四','五','六'];

function calRender(){
  if(!PP_DATA.length) return;
  const label=document.getElementById('cal-month-label');
  label.textContent=`${calYear} 年 ${calMonth+1} 月`;
  const byLine=groupLineSegments(PP_DATA);
  // Build event map: dateStr -> [{line,factory,style,buyer}]
  const evtMap={};
  Object.values(byLine).forEach(l=>{
    if(calFac!=='ALL'&&l.factory!==calFac) return;
    l.segs.forEach(seg=>{
      if(!seg.sewingStart) return;
      const d=new Date(seg.sewingStart); const key=`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
      if(!evtMap[key]) evtMap[key]=[];
      evtMap[key].push({line:l.line,factory:l.factory,style:seg.style,buyer:seg.buyer,ie:seg.ie});
    });
  });
  const grid=document.getElementById('cal-grid'); grid.innerHTML='';
  DOW.forEach(d=>{const h=document.createElement('div');h.className='cal-dow';h.textContent=d;grid.append(h);});
  const first=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const prevDays=new Date(calYear,calMonth,0).getDate();
  // prev month filler
  for(let i=0;i<first;i++){
    const c=document.createElement('div');c.className='cal-cell other-month';
    const dn=document.createElement('div');dn.className='cal-day-num';dn.textContent=prevDays-first+1+i;
    c.append(dn);grid.append(c);
  }
  for(let d=1;d<=daysInMonth;d++){
    const dt=new Date(calYear,calMonth,d);
    const isToday=dt.toDateString()===TODAY.toDateString();
    const isWeekend=dt.getDay()===0||dt.getDay()===6;
    const key=`${calYear}-${calMonth}-${d}`;
    const evts=evtMap[key]||[];
    const cell=document.createElement('div');
    cell.className=`cal-cell${isToday?' today':''}${isWeekend?' weekend':''}${evts.length?' has-event':''}`;
    const dn=document.createElement('div');dn.className='cal-day-num';dn.textContent=d;
    cell.append(dn);
    if(evts.length){
      const dots=document.createElement('div');dots.className='cal-dots';
      evts.slice(0,4).forEach(ev=>{const dot=document.createElement('div');dot.className='cal-dot';dot.style.background=facColor(ev.factory);dots.append(dot);});
      if(evts.length>4){const more=document.createElement('span');more.className='cal-more';more.textContent=`+${evts.length-4}`;dots.append(more);}
      cell.append(dots);
      evts.slice(0,3).forEach(ev=>{const t=document.createElement('div');t.className='cal-event-tag';t.style.cssText=`background:${facColor(ev.factory)}20;color:${facColor(ev.factory)};border-left:2px solid ${facColor(ev.factory)}`;t.title=`${ev.line} ${ev.style}`;t.textContent=`${ev.line} ${ev.style}`;cell.append(t);});
      cell.addEventListener('click',()=>calShowDayModal(d,evts));
    }
    grid.append(cell);
  }
  // trailing filler
  const total=first+daysInMonth; const trailing=(7-total%7)%7;

}

// LINE SCHEDULE (組別排程)
// ══════════════════════════════════════════
let lsFac='ALL';
const lsSel={buyer:new Set(),style:new Set()};
const lsOpts={buyer:[],style:[]};
const LS_TYPES=['buyer','style'];
const MAX_SEGS=3;

// Colour palette for styles
const styleColCache={};
function getStyleCol(style){if(!styleColCache[style])styleColCache[style]=styleColor(style);return styleColCache[style];}

function lsInitOpts(){lsOpts.buyer=[...new Set(PP_DATA.map(r=>r.Buyer).filter(Boolean))].sort();lsOpts.style=[...new Set(PP_DATA.map(r=>r.Style).filter(Boolean))].sort();LS_TYPES.forEach(t=>lsBuildDrop(t,lsOpts[t]));}
function lsToggleFac(btn){lsFac=btn.dataset.f;document.querySelectorAll('#page-ls .fac-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');lsRender();}
function lsOnFI(type){const q=document.getElementById('lsfi-'+type).value.toLowerCase();lsSel[type].clear();if(q) lsOpts[type].filter(i=>i.toLowerCase().includes(q)).forEach(i=>lsSel[type].add(i));lsBuildDrop(type,lsOpts[type]);lsOpenDrop(type);lsRender();lsUpdateTags();}
function lsOpenDrop(type){lsBuildDrop(type,lsOpts[type]);LS_TYPES.forEach(t=>document.getElementById('lsdrop-'+t).classList.toggle('open',t===type));}
function lsBuildDrop(type,items){const p=document.getElementById('lsdrop-'+type);p.innerHTML='';items.forEach(item=>{const d=document.createElement('div');d.className='drop-item';const cb=document.createElement('input');cb.type='checkbox';cb.value=item;cb.checked=lsSel[type].has(item);cb.addEventListener('change',()=>{if(cb.checked)lsSel[type].add(item);else lsSel[type].delete(item);lsRender();lsUpdateTags();});const lbl=document.createElement('span');lbl.textContent=item;d.append(cb,lbl);p.append(d);});}
function lsUpdateTags(){}
document.addEventListener('click',e=>{if(!e.target.closest('[id^="lsfg-"]'))LS_TYPES.forEach(t=>document.getElementById('lsdrop-'+t)?.classList.remove('open'));});

function lsRender(){
  if(!PP_DATA.length) return;
  const byLine=groupLineSegments(PP_DATA);
  const lines=Object.values(byLine).filter(l=>{
    if(lsFac!=='ALL'&&l.factory!==lsFac) return false;
    if(lsSel.buyer.size&&!l.segs.some(s=>lsSel.buyer.has(s.buyer))) return false;
    if(lsSel.style.size&&!l.segs.some(s=>lsSel.style.has(s.style))) return false;
    return true;
  }).sort((a,b)=>a.line.localeCompare(b.line,undefined,{numeric:true}));

  document.getElementById('ls-count').textContent=`${lines.length} 組別`;

  // Build thead
  const thead=document.getElementById('ls-thead-row'); thead.innerHTML='';
  const thLine=document.createElement('th');thLine.textContent='Line';thead.append(thLine);
  for(let i=0;i<MAX_SEGS;i++){
    const thS=document.createElement('th');thS.textContent=i===0?'當前款式（Active）':i===1?'→ 次款':'→ 第三款';thead.append(thS);
    const thD=document.createElement('th');thD.textContent=i===0?'上線 ~ 結束':'上線日';thead.append(thD);
  }

  const tbody=document.getElementById('ls-tbody'); tbody.innerHTML='';
  lines.forEach(l=>{
    const tr=document.createElement('tr');
    const tdLine=document.createElement('td');tdLine.className='ls-line-cell';
    tdLine.innerHTML=`<span class="fac-dot" style="background:${facColor(l.factory)};margin-right:4px;display:inline-block"></span>${l.line}`;
    tr.append(tdLine);
    // Active Segment 起點：SewingFinish >= 今天的第一個
    const lsActiveIdx=getActiveIdx(l.segs);
    for(let i=0;i<MAX_SEGS;i++){
      const seg=l.segs[lsActiveIdx+i];
      const tdS=document.createElement('td'); tdS.className='ls-seg-cell';
      const tdD=document.createElement('td');
      if(i>0){tdS.classList.add('ls-divider-'+(i===1?'green':'orange'));}
      if(seg){
        const bg=getStyleCol(seg.style);
        const d=seg.sewingStart?daysDiff(new Date(seg.sewingStart)):9999;
        const dateUrgent=i>0&&d<=7?'ls-date-urgent':'';
        tdS.innerHTML=`<div class="ls-seg-inner" style="background:${bg}">
          <div class="ls-seg-style">${seg.style}</div>
          <div style="font-size:10px;color:var(--text2)">${seg.buyer} · IE ${seg.ie||'—'}</div>
        </div>`;
        const dateStr=i===0
          ?`${seg.sewingStart?fmtDate(new Date(seg.sewingStart)):'—'} ~ ${seg.sewingFinish?fmtDate(new Date(seg.sewingFinish)):'—'}`
          :`<span class="${dateUrgent}">${seg.sewingStart?fmtDate(new Date(seg.sewingStart)):'—'}</span>`;
        tdD.innerHTML=dateStr;
        // hover highlight same style
        tdS.dataset.style=seg.style;
        tdS.addEventListener('mouseenter',()=>{document.querySelectorAll('.ls-seg-cell').forEach(c=>{if(c.dataset.style===seg.style){c.style.filter='saturate(2.5) brightness(.9)';c.style.outline='2px solid var(--purple)';}});});
        tdS.addEventListener('mouseleave',()=>{document.querySelectorAll('.ls-seg-cell').forEach(c=>{c.style.filter='';c.style.outline='';});});
        tdS.addEventListener('click',()=>lsShowStyleModal(seg.style));
      } else { tdS.innerHTML='<div style="color:var(--text3);font-size:11px;padding:4px">—</div>'; }
      tr.append(tdS,tdD);
    }
    tbody.append(tr);
  });
}

function lsShowStyleModal(style){
  document.getElementById('ls-modal-title').textContent=`款式：${style}`;
  const byLine=groupLineSegments(PP_DATA);
  const rows=[];
  Object.values(byLine).forEach(l=>{
    l.segs.forEach(seg=>{
      if(seg.style===style) rows.push({line:l.line,factory:l.factory,buyer:seg.buyer,ie:seg.ie,start:seg.sewingStart,finish:seg.sewingFinish,qty:seg.allocQTY});
    });
  });
  rows.sort((a,b)=>(a.start||0)-(b.start||0));
  const body=document.getElementById('ls-modal-body');
  const totalQty=rows.reduce((a,r)=>a+r.qty,0);
  body.innerHTML=`<div style="font-size:12px;color:var(--text2);margin-bottom:10px">共 ${rows.length} 組別 · 總 QTY ${fmtN(totalQty)}</div>`+rows.map(r=>`
<div class="modal-row">
  <span class="fac-dot" style="background:${facColor(r.factory)}"></span>
  <span style="font-weight:600;min-width:50px">${r.line}</span>
  <span class="badge" style="background:${facColor(r.factory)}22;color:${facColor(r.factory)}">${r.factory}</span>
  <span style="color:var(--text2);font-size:11px">${r.buyer}</span>
  <span style="flex:1;text-align:right;font-size:11px">IE ${r.ie||'—'}</span>
  <span style="min-width:80px;text-align:right;font-size:11px">${r.start?fmtDate(new Date(r.start)):'—'} ~ ${r.finish?fmtDate(new Date(r.finish)):'—'}</span>
  <span style="min-width:60px;text-align:right;font-size:11px;font-weight:600">${fmtN(r.qty)}</span>
</div>`).join('');
  document.getElementById('ls-modal-backdrop').classList.add('open');
}

// ══════════════════════════════════════════
// EFFICIENCY MONITOR
// ══════════════════════════════════════════
let EFF_DATA=[], effFac='ALL';

document.getElementById('eff-file-in').addEventListener('change',async function(e){
  const files=[...e.target.files]; if(!files.length) return;
  document.getElementById('eff-progress').textContent='⏳ 解析效率報表…';
  EFF_DATA=[];
  for(const f of files){
    const zip=await xlsxLoadZip(f); const ssArr=await xlsxGetSS(zip);
    const {sheets,relMap}=await xlsxGetSheets(zip);
    // Find data sheet: prefer "Data", else first
    let target=null;
    for(const sh of sheets){ if(sh.name.toLowerCase()==='data'){target=relMap[sh.rId];break;} }
    if(!target&&sheets.length) target=relMap[sheets[0].rId];
    if(!target) continue;
    const shPath=target.startsWith('xl/')?target:'xl/'+target;
    const shFile=zip.file(shPath); if(!shFile) continue;
    const shXml=await shFile.async('text');
    const allRows=[]; const rr=/<row\s[^>]*r="(\d+)"[^>]*>([\s\S]*?)<\/row>/g; let r;
    while((r=rr.exec(shXml))!==null) allRows.push({rn:parseInt(r[1]),cells:xlsxParseRow(r[2],ssArr)});
    // Find header row: contains "Sewing"
    let headerRow=-1, colMap={}, hourCols=[];
    for(const {rn,cells} of allRows.slice(0,15)){
      const vals=Object.values(cells).map(v=>(v||'').toLowerCase());
      if(vals.some(v=>v.includes('sewing'))){
        headerRow=rn;
        for(const [col,val] of Object.entries(cells)){
          const v=(val||'').toLowerCase().trim();
          if(v.includes('sewing')) colMap.Sewing=col;
          else if(v==='style') colMap.Style=col;
          else if(v==='total') colMap.Total=col;
          else if(v.startsWith('<')||v.match(/^\d{2}-\d{2}$/)||v.startsWith('>=')) { colMap[val]=col; hourCols.push({label:val,col}); }
        }
        break;
      }
    }
    if(headerRow<0) continue;
    for(const {rn,cells} of allRows){
      if(rn<=headerRow) continue;
      const sewing=(cells[colMap.Sewing||'A']||'').trim(); if(!sewing) continue;
      const lineNum=parseInt(sewing.split('-')[0]);
      const factory=lineNum===1?'GLD1':lineNum===2?'GLD2':lineNum===3?'GLD3':lineNum===5?'GLD5':lineNum===6?'GLD6':'GLD?';
      const style=(cells[colMap.Style||'B']||'').trim();
      const hourData={}; let autoTotal=0;
      hourCols.forEach(({label,col})=>{const v=parseFloat(cells[col])||0;hourData[label]=v;autoTotal+=v;});
      const totalRaw=parseFloat(cells[colMap.Total||''])||0;
      const total=totalRaw||autoTotal;
      EFF_DATA.push({Sewing:sewing,Factory:factory,Style:style,hourData,total,hourCols:hourCols.map(h=>h.label)});
    }
  }
  document.getElementById('eff-progress').textContent=`✅ ${EFF_DATA.length} 筆效率資料`;
  // Build waktu options
  const wSel=document.getElementById('eff-waktu'); wSel.innerHTML='';
  for(let h=7;h<=19;h++){for(let m=0;m<60;m+=30){if(h===19&&m>0)break;const label=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;const opt=document.createElement('option');opt.value=label;opt.textContent=label;wSel.append(opt);}}
  // Auto-select nearest
  const now=new Date(); const curMin=now.getHours()*60+now.getMinutes();
  const opts=[...wSel.options]; let best=opts[0];
  opts.forEach(o=>{const [oh,om]=o.value.split(':').map(Number);const om2=oh*60+om;if(om2<=curMin) best=o;});
  best.selected=true;
  document.getElementById('eff-upload-outer').style.display='none';
  document.getElementById('eff-main').style.display='block';
  effRecalc(); e.target.value='';
});

function effToggleFac(btn){effFac=btn.dataset.f;document.querySelectorAll('#page-eff .fac-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');effRecalc();}

function effCalcWaktu(waktuStr){
  const [wh,wm]=waktuStr.split(':').map(Number);
  let hours=(wh*60+wm-7*60)/60;
  if(wh*60+wm>13*60) hours-=1; // deduct lunch
  return Math.max(hours,0.5);
}

function effRecalc(){
  if(!EFF_DATA.length) return;
  const waktu=document.getElementById('eff-waktu').value;
  const targetEff=parseFloat(document.getElementById('eff-target').value)/100||0.8;
  const hours=effCalcWaktu(waktu);
  document.getElementById('eff-hours-label').textContent=`已生產 ${hours.toFixed(1)} 小時`;

  // Group by Sewing
  const bySewing={};
  EFF_DATA.forEach(r=>{
    if(effFac!=='ALL'&&r.Factory!==effFac) return;
    if(!bySewing[r.Sewing]) bySewing[r.Sewing]={sewing:r.Sewing,factory:r.Factory,rows:[]};
    bySewing[r.Sewing].rows.push(r);
  });

  // Get all hour labels (union)
  const allHours=EFF_DATA[0]?.hourCols||[];

  // Build table
  const thead=document.getElementById('eff-thead');
  const fixedCols=['Len','Buyer','Style','IE','MP',...allHours,'Total','Avg/hr','Eff','目標Eff','目標out','目標Avg'];
  thead.innerHTML=`<tr>${fixedCols.map(c=>`<th>${c}</th>`).join('')}</tr>`;

  const tbody=document.getElementById('eff-tbody'); tbody.innerHTML='';
  let count=0;

  Object.values(bySewing).forEach(grp=>{
    count++;
    const mainRow=grp.rows[0];
    // Lookup IE from PP_DATA
    const getIE=(sewing,style)=>{
      let found=PP_DATA.find(d=>d.Line===sewing&&d.Style===style);
      if(!found) found=PP_DATA.find(d=>d.Style===style);
      if(!found) found=PP_DATA.find(d=>d.Line===sewing);
      return found?found.IE:0;
    };
    const getBuyer=(sewing,style)=>{
      let found=PP_DATA.find(d=>d.Line===sewing&&d.Style===style)||PP_DATA.find(d=>d.Style===style)||PP_DATA.find(d=>d.Line===sewing);
      return found?found.Buyer:'—';
    };

    // Main row: sum of all sub-styles
    const totalSum=grp.rows.reduce((a,r)=>a+r.total,0);
    const hourSums={}; allHours.forEach(h=>{hourSums[h]=grp.rows.reduce((a,r)=>a+(r.hourData[h]||0),0);});
    const avgHr=hours>0?totalSum/hours:0;
    const mainIE=getIE(grp.sewing,grp.rows[0]?.Style)||0;
    const mp=grp.mp||38;
    const eff=mainIE&&mp?avgHr*mainIE/2.52/mp:0;
    const gap=targetEff-eff;
    const effClass=gap<=0.10?'eff-green':gap<=0.20?'eff-orange':'eff-red';
    const targetOut=targetEff*2.52*mp/mainIE*hours;
    const targetAvg=hours>0?targetOut/hours:0;

    const tr=document.createElement('tr'); tr.className=`main-row ${effClass} eff-main-bar`;
    tr.innerHTML=`<td class="left"><span class="fac-dot" style="background:${facColor(grp.factory)};margin-right:4px;display:inline-block"></span>${grp.sewing}</td>
<td class="left">${getBuyer(grp.sewing,grp.rows[0]?.Style)}</td>
<td class="left">${grp.rows.map(r=>r.Style).join(', ')}</td>
<td>${mainIE||'—'}</td>
<td><input class="eff-mp-input" type="number" value="${mp}" min="1" max="100" onchange="effSetMP('${grp.sewing}',this.value)"></td>
${allHours.map(h=>`<td class="${hourSums[h]===0?'eff-zero':''}">${hourSums[h]||0}</td>`).join('')}
<td><b>${fmtN(Math.round(totalSum))}</b></td>
<td>${avgHr.toFixed(1)}</td>
<td class="eff-val">${eff>0?(eff*100).toFixed(1)+'%':'—'}</td>
<td style="background:var(--surface2)">${(targetEff*100).toFixed(0)}%</td>
<td style="background:var(--surface2)">${mainIE?fmtN(Math.round(targetOut)):'—'}</td>
<td style="background:var(--surface2)">${mainIE?targetAvg.toFixed(1):'—'}</td>`;
    tbody.append(tr);

    // Sub rows (if multiple styles)
    if(grp.rows.length>1){
      grp.rows.forEach(r=>{
        const ie=getIE(grp.sewing,r.Style);
        const avg=hours>0?r.total/hours:0;
        const e=ie&&mp?avg*ie/2.52/mp:0;
        const g=targetEff-e;
        const ec=g<=0.10?'eff-green':g<=0.20?'eff-orange':'eff-red';
        const str=document.createElement('tr'); str.className=`sub-row ${ec}`;
        str.innerHTML=`<td></td><td class="left">${getBuyer(grp.sewing,r.Style)}</td><td class="left">${r.Style}</td><td>${ie||'—'}</td><td></td>
${allHours.map(h=>`<td class="${(r.hourData[h]||0)===0?'eff-zero':''}">${r.hourData[h]||0}</td>`).join('')}
<td>${fmtN(Math.round(r.total))}</td><td>${avg.toFixed(1)}</td>
<td class="eff-val">${e>0?(e*100).toFixed(1)+'%':'—'}</td><td></td><td></td><td></td>`;
        tbody.append(str);
      });
    }
  });
  document.getElementById('eff-count').textContent=`${count} 組別`;
}

// store MP per sewing
const effMPMap={};
function effSetMP(sewing,val){
  effMPMap[sewing]=parseFloat(val)||38;
  // Find and update the group
  const bySewing={}; EFF_DATA.forEach(r=>{if(!bySewing[r.Sewing]) bySewing[r.Sewing]=r; bySewing[r.Sewing].mp=effMPMap[r.Sewing]||38;});
  effRecalc();
}
